<?xml version="1.0" encoding="UTF-8"?>
<!-- Template: substitute {{LOCATION}}, {{TEMPERATURE}}, {{UNIT_SYMBOL}}, {{TIMESTAMP}} -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#4285F4"/>
      <stop offset="55%" stop-color="#7B68EE"/>
      <stop offset="100%" stop-color="#EA4335"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="400" height="220" rx="18" fill="url(#bg)"/>
  <rect x="0" y="0" width="400" height="220" rx="18" fill="white" opacity="0.04"/>

  <text x="28" y="44" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff" opacity="0.92">{{LOCATION}}</text>
  <text x="28" y="66" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="11" fill="#ffffff" opacity="0.7">via Open-Meteo</text>

  <text x="200" y="150" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="72" font-weight="700" fill="#ffffff" filter="url(#shadow)">{{TEMPERATURE}}{{UNIT_SYMBOL}}</text>

  <text x="200" y="188" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.75">{{TIMESTAMP}}</text>

  <g transform="translate(340, 36)">
    <circle cx="0" cy="0" r="14" fill="#FFC107" opacity="0.95"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.25"/>
  </g>
</svg>
